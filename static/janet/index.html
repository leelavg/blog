<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>janet</title>
		<link rel="icon" type="image/x-icon" href="/images/favicon.ico">
		<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
		<style>
			@font-face {
				font-family: "IBM Plex Mono";
				src: url("/fonts/IBMPlexMono-Regular.otf") format("opentype");
				font-weight: 400;
				font-style: normal;
				font-display: swap;
			}
			
			:root {
				--bg: #f2e5bc;
				--fg: #3c3836;
				--border: #d5c4a1;
				--err: #cc241d;
				--font-mono: "IBM Plex Mono", "SF Mono", Monaco, Consolas, "Courier New", monospace;
				--foreground: #3c3836;
				--selection: #d5c4a1;
				--line: #ebdbb2;
				--comment: #7c6f64;
				--red: #cc241d;
				--orange: #d65d0e;
				--green: #79740e;
				--blue: #076678;
				--purple: #8f3f71;
				--repl-background: #f2e5bccc;
				--repl-backdrop: blur(5px);
				--selection-bg: #d5c4a1;
				--selection-fg: #3c3836;
			}
			
			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #32302f;
					--fg: #ebdbb2;
					--border: #504945;
					--err: #fb4934;
					--foreground: #ebdbb2;
					--selection: #504945;
					--line: #3c3836;
					--comment: #928374;
					--red: #fb4934;
					--orange: #fe8019;
					--green: #b8bb26;
					--blue: #83a598;
					--purple: #d3869b;
					--repl-background: #32302fcc;
					--repl-backdrop: blur(5px);
					--selection-bg: #504945;
					--selection-fg: #ebdbb2;
				}
			}
			
			::selection { background: var(--selection-bg); color: var(--selection-fg); }
			
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
			
			html, body { height: 100dvh; }
			
			body {
				background-color: var(--bg);
				color: var(--fg);
				display: flex;
				flex-direction: column;
				font-family: var(--font-mono);
				font-size: 1.1rem;
			}
			
			header {
				padding: 0.5rem 1rem;
				border-bottom: 1px solid var(--border);
				display: flex;
				align-items: center;
				justify-content: space-between;
				flex-shrink: 0;
				font-size: 0.85rem;
			}
			
			header a { color: var(--fg); text-decoration: none; opacity: 0.5; }
			header a:hover { opacity: 1; }
			
			.attribution { font-size: 0.75rem; font-style: italic; opacity: 0.6; }
			
			#repl {
				flex: 1;
				display: flex;
				flex-direction: column;
				white-space: pre;
				padding: 8px;
				line-height: 1.4;
				overflow: hidden;
			}
			
			#repl .output { flex-grow: 1; overflow-y: auto; }
			#repl .input-section { display: flex; flex-direction: row; flex-shrink: 0; }
			#repl .input-section .prompt { padding-right: 4px; user-select: none; -webkit-user-select: none; }
			#repl .cm-editor { flex: 1; }
			#repl .err { color: var(--err); }
			
			#repl .cm-focused .cm-matchingBracket {
				text-decoration: underline;
				text-decoration-color: var(--green);
				color: var(--green);
				background-color: initial !important;
			}
			
			#repl .cm-focused .cm-nonmatchingBracket {
				outline: 1px solid var(--err);
				border-radius: 2px;
				color: var(--err);
				background-color: initial !important;
			}
			
			#loading { padding: 8px; opacity: 0.5; font-size: 0.85rem; }
			
			#mobile-keys {
				display: none;
				flex-shrink: 0;
				flex-wrap: wrap;
				padding: 4px 8px;
				gap: 4px;
				border-bottom: 1px solid var(--border);
			}
			
			@media (pointer: coarse) { #mobile-keys { display: flex; } }
			
			#mobile-keys button {
				font-family: var(--font-mono);
				font-size: 1rem;
				padding: 4px 10px;
				background: none;
				border: 1px solid var(--border);
				border-radius: 4px;
				color: var(--fg);
				cursor: pointer;
				flex-shrink: 0;
			}
			
			#mobile-keys button:active { background-color: var(--border); }
			.sep { opacity: 0.3; align-self: center; flex-shrink: 0; pointer-events: none; }
			
			#bottom-bar {
				display: flex;
				align-items: center;
				gap: 1rem;
				padding: 0.5rem 1rem;
				border-top: 1px solid var(--border);
				flex-shrink: 0;
				font-size: 0.85rem;
				position: relative;
			}
			
			#bottom-bar button {
				font-family: var(--font-mono);
				font-size: 0.85rem;
				background: none;
				border: none;
				color: var(--fg);
				cursor: pointer;
				padding: 0;
				opacity: 0.7;
			}
			
			#bottom-bar button:hover { opacity: 1; }
			
			#bottom-bar label {
				display: flex;
				align-items: center;
				gap: 0.3rem;
				opacity: 0.7;
				cursor: pointer;
			}
			
			#bottom-bar label:hover { opacity: 1; }
			
			#bottom-bar .note { margin-left: auto; opacity: 0.35; font-size: 0.75rem; font-style: italic; }
			
			#load-menu {
				display: none;
				position: absolute;
				bottom: 100%;
				left: 1rem;
				background: var(--bg);
				border: 1px solid var(--border);
				min-width: 220px;
				max-height: 200px;
				overflow-y: auto;
				z-index: 10;
				font-size: 0.85rem;
			}
			
			#load-menu.open { display: block; }
			
			#load-menu .menu-item {
				padding: 0.4rem 0.75rem;
				cursor: pointer;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			
			#load-menu .menu-item:hover { background: var(--border); }
			#load-menu .menu-empty { padding: 0.4rem 0.75rem; opacity: 0.5; }
			
			#store-input {
				display: none;
				font-family: var(--font-mono);
				font-size: 0.85rem;
				background: none;
				border: none;
				border-bottom: 1px solid var(--border);
				color: var(--fg);
				outline: none;
				width: min(32ch, 50%);
			}
			
			#store-confirm { opacity: 0.5; font-size: 0.8rem; display: none; }
		</style>
	</head>
	<body>
		<header>
			<span>repl</span>
			<span class="attribution">blatantly copied from <a href="https://janet.guide" target="_blank" rel="noopener">janet.guide</a></span>
			<span>
				<a href="https://janet-lang.org/docs/index.html" target="_blank" rel="noopener">docs</a>
				<a href="/">blog</a>
			</span>
		</header>
		<div id="mobile-keys"></div>
		<div id="repl"><span id="loading">Loading Janet...</span></div>
		<div id="bottom-bar">
			<div id="load-menu"></div>
			<button id="btn-load">load ▾</button>
			<label><input type="checkbox" id="toggle-output" checked>
			output</label>
			<span class="sep">&bull;</span>
			<button id="btn-store">store</button>
			<input id="store-input" type="text" spellcheck="false">
			<span id="store-confirm"></span>
			<span class="sep">&bull;</span>
			<button id="btn-clear-files">clear files</button>
			<span class="note">restart: refresh page</span>
		</div>
		<script data-repl="all.ca5b30588c0206a6.js">
			var base = location.href.endsWith('/') ? location.href : location.href + '/';
			import(base + document.currentScript.dataset.repl).then(function(m) { m.default(); }).catch(console.error);
			
			if ('serviceWorker' in navigator)
			navigator.serviceWorker.register('/sw-janet.js', {scope: '/janet'});
			
			// --- store / load ---
			var PREFIX = 'jtf-';
			
			function readOutput() {
				var out = document.querySelector('#repl .output');
				if (!out) return [];
				var entries = [];
				out.childNodes.forEach(function(span) {
					var text = span.textContent || '';
					if (text.charAt(0) === '❯') {
						entries.push({ type: 'input', text: text.slice(2).replace(/\n$/, '') });
						} else {
							var t = text.replace(/\n$/, '');
							if (t) entries.push({ type: 'output', text: t });
						}
						});
						return entries;
					}
					
					function appendToOutput(entries) {
						var out = document.querySelector('#repl .output');
						if (!out) return;
						var withOutput = document.getElementById('toggle-output').checked;
						entries.forEach(function(e) {
							if (e.type === 'output' && !withOutput) return;
							var span = document.createElement('span');
							span.textContent = (e.type === 'input' ? '❯ ' + e.text : e.text) + '\n';
							out.appendChild(span);
							});
							out.scrollTop = out.scrollHeight;
						}
						
						function allKeys() {
							return Object.keys(localStorage).filter(function(k) { return k.startsWith(PREFIX); }).sort().reverse();
						}
						
						function genId() {
							var now = new Date();
							var pad = function(n) { return String(n).padStart(2, '0'); };
							return PREFIX + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) +
							'-' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
						}
						
						var loadMenu = document.getElementById('load-menu');
						var btnLoad = document.getElementById('btn-load');
						var btnStore = document.getElementById('btn-store');
						var storeInput = document.getElementById('store-input');
						var storeConfirm = document.getElementById('store-confirm');
						var confirmTimer;
						var storeOpen = false;
						var pendingEntries = [];
						
						// load
						btnLoad.addEventListener('click', function(e) {
							e.stopPropagation();
							if (loadMenu.classList.contains('open')) { loadMenu.classList.remove('open'); return; }
							var keys = allKeys();
							loadMenu.innerHTML = '';
							if (keys.length === 0) {
								var empty = document.createElement('div');
								empty.className = 'menu-empty';
								empty.textContent = 'no saved sessions';
								loadMenu.appendChild(empty);
								} else {
									keys.forEach(function(k) {
										var item = document.createElement('div');
										item.className = 'menu-item';
										item.textContent = k;
										item.addEventListener('click', function() {
											loadMenu.classList.remove('open');
											try {
												var entries = JSON.parse(localStorage.getItem(k) || '[]');
												if (document.getElementById('toggle-output').checked) {
													// snapshot mode: append full transcript to output
													appendToOutput(entries);
													} else {
														// restore mode: populate editor with inputs, user presses Enter
														var script = entries
														.filter(function(e) { return e.type === 'input'; })
														.map(function(e) { return e.text; })
														.join('\n');
														var cm = document.querySelector('.cm-content');
														if (cm && script) {
															cm.focus();
															document.execCommand('selectAll');
															document.execCommand('insertText', false, script);
														}
													}
													} catch(err) { console.error('load failed', err); }
													});
													loadMenu.appendChild(item);
													});
												}
												loadMenu.classList.add('open');
												});
												
												document.addEventListener('click', function() { loadMenu.classList.remove('open'); });
												
												// store
												btnStore.addEventListener('click', function() {
													if (storeOpen) { storeInput.style.display = 'none'; storeOpen = false; return; }
													pendingEntries = readOutput();
													if (pendingEntries.length === 0) return;
													storeInput.value = genId();
													storeInput.style.display = 'inline';
													storeOpen = true;
													storeInput.focus();
													storeInput.select();
													});
													
													storeInput.addEventListener('keydown', function(e) {
														if (e.key === 'Escape') { storeInput.style.display = 'none'; storeOpen = false; return; }
														if (e.key !== 'Enter') return;
														var id = storeInput.value.trim();
														if (!id) return;
														localStorage.setItem(id, JSON.stringify(pendingEntries));
														storeInput.style.display = 'none';
														storeOpen = false;
														clearTimeout(confirmTimer);
														storeConfirm.textContent = 'saved: ' + id;
														storeConfirm.style.display = 'inline';
														confirmTimer = setTimeout(function() { storeConfirm.style.display = 'none'; }, 3000);
														});
														
														storeInput.addEventListener('click', function(e) { e.stopPropagation(); });
														
														// clear all saved files
														document.getElementById('btn-clear-files').addEventListener('click', function() {
															var keys = allKeys();
															if (keys.length === 0) return;
															if (!confirm('Delete all ' + keys.length + ' saved file(s)?')) return;
															keys.forEach(function(k) { localStorage.removeItem(k); });
															});
															
															// --- mobile keys ---
															var bar = document.getElementById('mobile-keys');
															var KEYS = [
															['(', ')', '[', ']', '{', '}'],
															['@', ':', '#', '~', '&'],
															['"', "'", '\\'],
															['+', '-', '*', '/', '%', '=', '>', '->'],
															[',', ';', '!', '?', '_'],
															];
															KEYS.forEach(function(group, i) {
																if (i > 0) { var sep = document.createElement('span'); sep.className = 'sep'; sep.textContent = '·'; bar.appendChild(sep); }
																group.forEach(function(ch) {
																	var btn = document.createElement('button');
																	btn.textContent = ch;
																	btn.dataset.char = ch;
																	btn.addEventListener('mousedown', function(e) {
																		e.preventDefault();
																		var cm = document.querySelector('.cm-content');
																		if (cm) { cm.focus(); document.execCommand('insertText', false, ch); }
																		});
																		bar.appendChild(btn);
																		});
																		});
		</script>
	</body>
</html>
